services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticketflow
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow
    ports:
      - "5432:5432"
    volumes:
      - ticketflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow -d ticketflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticketflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ticketflow-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build:
      context: ./api
    container_name: ticketflow-api
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py flush --no-input &&
      python manage.py migrate &&
      python manage.py seed &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/schema/', timeout=5)\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  payment:
    build:
      context: ./payments
    container_name: ticketflow-payments
    command: npm run dev
    volumes:
      - ./payments:/app
      - /app/node_modules
    ports:
      - "5001:5001"
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env

  web:
    build:
      context: ./web
    container_name: ticketflow-web
    command: npm run dev -- --host
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000/api
    depends_on:
      api:
        condition: service_healthy
  order-cleanup:
    build:
      context: ./api
    container_name: ticketflow-order-cleanup
    restart: unless-stopped
    command: >
      sh -c "
      while true;
      do
        python manage.py cleanup_expired_orders;
        sleep 60;
      done
      "
    volumes:
      - ./api:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
volumes:
  ticketflow-postgres-data:
  ticketflow-redis-data: