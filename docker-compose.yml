services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticketflow
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow
    ports:
      - "5432:5432"
    volumes:
      - ticketflow-postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    container_name: ticketflow-api
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py flush --no-input &&
      python manage.py migrate &&
      python manage.py seed &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - .env

  payment:
    build:
      context: ./payments
    container_name: ticketflow-payments
    command: npm run dev
    volumes:
      - ./payments:/app
      - /app/node_modules
    ports:
      - "5001:5001"
    depends_on:
      - api
    env_file:
      - .env

  web:
    build:
      context: ./web
    container_name: ticketflow-web
    command: npm run dev -- --host
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000/api
    depends_on:
      - api

volumes:
  ticketflow-postgres-data: